# =============================================================================
# 5C Security Lab - Service Accounts
# VULNERABILITY: automountServiceAccountToken: true (NCA-ECC 2-3-2)
#   SA tokens auto-mounted even when not needed by application
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vuln-app-sa
  namespace: ai-governance
automountServiceAccountToken: true
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vuln-app-sa
  namespace: finance-prod
automountServiceAccountToken: true
