<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="900" height="400">
  <!-- Background gradient (optional, can be transparent) -->
  <defs>
    <radialGradient id="bgGlow" cx="200" cy="200" r="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a1929"/>
      <stop offset="100%" stop-color="#050d15"/>
    </radialGradient>
    <linearGradient id="cyanGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#00b8d4"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="900" height="400" fill="url(#bgGlow)"/>

  <!-- Subtle crosshair corner marks (evoking the reticle in the original) -->
  <g stroke="#1e3a5f" stroke-width="2" fill="none" opacity="0.4">
    <path d="M 40 80 L 40 40 L 80 40"/>
    <path d="M 360 80 L 360 40 L 320 40"/>
    <path d="M 40 320 L 40 360 L 80 360"/>
    <path d="M 360 320 L 360 360 L 320 360"/>
  </g>

  <!-- Cyan outer ring (glowing) -->
  <circle cx="200" cy="200" r="145" fill="none" stroke="url(#cyanGlow)" stroke-width="8" filter="url(#glow)"/>
  <circle cx="200" cy="200" r="145" fill="none" stroke="#00e5ff" stroke-width="3"/>

  <!-- Cyan crosshair marks on ring -->
  <g stroke="#00e5ff" stroke-width="2.5" fill="none">
    <line x1="200" y1="40" x2="200" y2="60"/>
    <line x1="200" y1="340" x2="200" y2="360"/>
    <line x1="40" y1="200" x2="60" y2="200"/>
    <line x1="340" y1="200" x2="360" y2="200"/>
  </g>

  <!-- Inner dark disk -->
  <circle cx="200" cy="200" r="132" fill="#0a1929"/>

  <!-- Shield shape (white) -->
  <path d="M 200 90
           L 280 115
           L 280 210
           Q 280 270 200 315
           Q 120 270 120 210
           L 120 115
           Z"
        fill="white" stroke="white" stroke-width="2" stroke-linejoin="round"/>

  <!-- Stylized Z cut-out inside the shield (dark) -->
  <path d="M 155 155
           L 245 155
           L 245 175
           L 180 240
           L 245 240
           L 245 265
           L 155 265
           L 155 245
           L 220 180
           L 155 180
           Z"
        fill="#0a1929"/>

  <!-- ZEAL text (right side, large) -->
  <text x="420" y="175"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="900"
        font-size="105"
        letter-spacing="2"
        fill="white">ZEAL</text>

  <!-- DEFENSE text (right side, below ZEAL) -->
  <text x="420" y="275"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="700"
        font-size="75"
        letter-spacing="8"
        fill="white">DEFENSE</text>

  <!-- Subtle cyan underline beneath DEFENSE -->
  <line x1="420" y1="295" x2="780" y2="295" stroke="#00e5ff" stroke-width="2" opacity="0.6"/>
</svg>
